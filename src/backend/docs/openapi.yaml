openapi: 3.0.3
info:
  title: Rental API
  version: 1.0.0
servers:
  - url: /api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /auth/register:
    post:
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, confirmPassword]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string }
                confirmPassword: { type: string }
      responses:
        '201': { description: Created }

  /auth/login:
    post:
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200': { description: OK }

  /users/me:
    get:
      summary: Current user
      security:
        - bearerAuth: []
      responses:
        '200': { description: OK }
